seed: 42
device: cuda

wandb:
  enabled: true
  project: metaworld-coffee-push-DrM
  name: ReViWo_seed42

env:
  benchmark_id: Meta-World/MT1
  env_name: coffee-push
  image_height: 224
  image_width: 224
  frame_stack: 3
  action_repeat: 2
  max_episode_steps: 150

  camera:
    name: eval_cam
    r: 0.8
    theta: -30.0
    phi: 0.0
    fovy: 45.0

  lookat: [0.0, 0.6, 0.0]
  up: [0.0, 0.0, 1.0]

vision:
  encoder_type: reviwo

  reviwo:
    checkpoint_path: ../../data/checkpoints/metaworld/encoders/ReViWo/coffee_push/step_00015000.pth

    img_size: 224         
    patch_size: 16      
    fusion_style: "plus"   

    # VQ usage switches
    use_latent_vq: true
    is_latent_ae: false
    use_view_vq: true
    is_view_ae: false

    # Transformer encoder / decoder configs
    view_encoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    latent_encoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    decoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    # Codebook configs
    view_codebook:
      embed_dim: 16
      n_embed: 64
      beta: 0.25

    latent_codebook:
      embed_dim: 16
      n_embed: 512
      beta: 0.25

agent:
  lr: 1.0e-4
  feature_dim: 50
  hidden_dim: 1024
  critic_target_tau: 0.01

  # DrM-specific knobs
  dormant_threshold: 0.025
  target_dormant_ratio: 0.20
  dormant_temp: 10.0
  target_lambda: 0.70
  lambda_temp: 50.0
  dormant_perturb_interval: 100000
  min_perturb_factor: 0.20
  max_perturb_factor: 0.95
  perturb_rate: 2.0

  stddev_type: awake
  stddev_schedule: linear(1.0,0.1,100000)
  stddev_clip: 0.3
  expectile: 0.9

train:
  num_train_steps: 1000000
  seed_steps: 4000
  batch_size: 256
  replay_size: 100000
  update_every_steps: 2
  gradient_steps: 3
  discount: 0.99

  replay_dir: ./buffer/metaworld/coffee_push/reviwo/seed42/
  replay_num_workers: 4
  replay_fetch_every: 1000
  save_replay_snapshot: false
  nstep: 3

  log_every_steps: 1000
  eval_every_steps: 5000
  num_eval_episodes: 100
  rolling_window: 10

  checkpoint_every_steps: 50000
  checkpoint_dir: ./checkpoints/metaworld/policies/drm/reviwo/coffee_push/seed42/

visualization:
  enabled: false
  window_name: metaworld_coffee_push_drm
  wait_key: 1
  scale: 1.0

