seed: 98
device: cuda

wandb:
  enabled: true
  project: metaworld-drawer-open-DrQv2
  name: ReViWo_seed98

env:
  benchmark_id: Meta-World/MT1
  env_name: drawer-open
  image_height: 128
  image_width: 128
  frame_stack: 3
  action_repeat: 2
  max_episode_steps: 250

  cameras:
    - name: cam0
      r: 0.8
      theta: -30.0
      phi: -30.0
      fovy: 45.0
    - name: cam1
      r: 0.8
      theta: -30.0         
      phi: 0.0             
      fovy: 45.0
    - name: cam2
      r: 0.8
      theta: -30.0       
      phi: 30.0          
      fovy: 45.0
    - name: cam3
      r: 0.8
      theta: -45.0        
      phi: -30.0          
      fovy: 45.0
    - name: cam4
      r: 0.8
      theta: -45.0         
      phi: 0.0            
      fovy: 45.0
    - name: cam5
      r: 0.8
      theta: -45.0     
      phi: 30.0            
      fovy: 45.0

  lookat: [0.0, 0.6, 0.0]
  up: [0.0, 0.0, 1.0]

vision:
  encoder_type: reviwo

  reviwo:
    checkpoint_path: ./checkpoints/metaworld/encoders/ReViWo/drawer_open/step_00100000.pth


    # Image & patch settings
    img_size: 128         
    patch_size: 16      
    fusion_style: "plus"   

    # VQ usage switches
    use_latent_vq: true
    is_latent_ae: false
    use_view_vq: true
    is_view_ae: false

    # Transformer encoder / decoder configs
    view_encoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    latent_encoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    decoder:
      block_size: 256
      vocab_size: 512
      n_tokens_per_frame: 256
      n_layer: 8
      n_head: 8
      n_embed: 128
      dropout: 0.1
      bias: false
      mask_rate: 0

    # Codebook configs
    view_codebook:
      embed_dim: 16
      n_embed: 64
      beta: 0.25

    latent_codebook:
      embed_dim: 16
      n_embed: 512
      beta: 0.25

agent:
  lr: 1.0e-4
  feature_dim: 100
  hidden_dim: 1024
  critic_target_tau: 0.01
  stddev_schedule: linear(1.0,0.1,100000)
  stddev_clip: 0.3
  expectile: 0.9

train:
  num_train_steps: 1000000
  seed_steps: 4000
  batch_size: 256
  replay_size: 100000
  update_every_steps: 2
  gradient_steps: 3
  discount: 0.99

  replay_dir: ./buffer/metaworld/drawer_open/reviwo/seed98/
  replay_num_workers: 4
  replay_fetch_every: 1000
  save_replay_snapshot: false
  nstep: 3

  log_every_steps: 1000
  eval_every_steps: 10000
  num_eval_episodes: 120
  rolling_window: 10

  checkpoint_every_steps: 50000
  checkpoint_dir: ./checkpoints/metaworld/policies/drqv2/reviwo/drawer_open/seed98/

visualization:
  enabled: false
  window_name: metaworld_drawer_open_drqv2
  wait_key: 1
  scale: 1.0

