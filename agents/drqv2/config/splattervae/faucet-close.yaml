seed: 98
device: cuda

wandb:
  enabled: true
  project: metaworld-faucet-close-DrQv2
  name: SplatterVAE-encoder

env:
  benchmark_id: Meta-World/MT1
  env_name: faucet-close
  image_height: 128
  image_width: 128
  frame_stack: 3
  action_repeat: 2
  max_episode_steps: 250

  cameras:
    - name: cam0
      r: 0.8
      theta: -45.0
      phi: 0.0
      fovy: 45.0
    - name: cam1
      r: 0.8
      theta: -45.0       
      phi: 180.0          
      fovy: 45.0
    - name: cam2
      r: 0.8
      theta: -60.0        
      phi: -30.0             
      fovy: 45.0
    - name: cam3
      r: 0.8
      theta: -60.0         
      phi: 210.0           
      fovy: 45.0
    - name: cam4
      r: 0.8
      theta: -30.0       
      phi: 45.0          
      fovy: 45.0
    - name: cam5
      r: 0.8
      theta: -30.0     
      phi: 135.0            
      fovy: 45.0

  lookat: [0.0, 0.6, 0.0]
  up: [0.0, 0.0, 1.0]

vision:
  encoder_type: splatter_vae
  img_height: 128
  img_width: 128

  vit:
    patch_size: 16
    in_chans: 3
    embed_dim: 256
    depth: 4
    num_heads: 4
    mlp_ratio: 4.0
    qkv_bias: true
    dropout: 0.0
    attn_dropout: 0.0
    drop_path_rate: 0.1
    layerscale_init: 1.0e-5
    selected_layers: [0, 1, 2, 3]
    decoder_depth: 12
    decoder_num_heads: 8
    decoder_mlp_ratio: 4.0
    decoder_drop_path_rate: 0.1
    decoder_selected_layers: [2, 5, 8, 11]
    dpt_features: 128

  splatter_vae:
    checkpoint_path: ./checkpoints/metaworld/encoders/SplatterVAE/faucet-close/step_00300000.pth
    feature_source: encoder
    max_sh_degree: 0
    num_gaussians_per_pixel: 4

    codebook:
      invariant:
        quantizer: vq
        embed_dim: 32
        n_embed: 512
        beta: 0.25
      dependent:
        quantizer: vq
        embed_dim: 32
        n_embed: 64
        beta: 0.25

    model:
      fusion_style: cat
      use_dependent_vq: true
      is_dependent_ae: false
      use_invariant_vq: true
      is_invariant_ae: false
      dep_input_mask_ratio: 0.75
      dep_mask_eval: true

agent:
  lr: 1.0e-4
  feature_dim: 256
  hidden_dim: 1024
  augment_pixels: false
  scene_state_head:
    token_hidden_dim: 256
    per_frame_dim: 256
    stacked_hidden_dim: 256
    stacked_num_layers: 2
    use_tanh: true
  critic_target_tau: 0.01

  # DrM-specific knobs
  dormant_threshold: 0.025
  target_dormant_ratio: 0.20
  dormant_temp: 10.0
  target_lambda: 0.70
  lambda_temp: 50.0
  dormant_perturb_interval: 100000
  min_perturb_factor: 0.20
  max_perturb_factor: 0.95
  perturb_rate: 2.0

  stddev_type: awake
  stddev_schedule: linear(1.0,0.1,100000)
  stddev_clip: 0.3
  expectile: 0.9

train:
  num_train_steps: 1000000
  seed_steps: 4000
  batch_size: 256
  replay_size: 1000000
  update_every_steps: 2
  gradient_steps: 1
  discount: 0.99

  replay_dir: ./buffer/metaworld/faucet-close/splattervae_encoder/seed98/
  replay_num_workers: 4
  nstep: 3

  log_every_steps: 1000
  eval_every_steps: 10000
  num_eval_episodes: 120
  rolling_window: 10

  checkpoint_every_steps: 50000
  checkpoint_dir: ./checkpoints/metaworld/policies/drqv2/splattervae_encoder/faucet-close/seed98/

visualization:
  enabled: false
  window_name: metaworld_faucet-close_drqv2
  wait_key: 1
  scale: 1.0
