seed: 66
device: cuda

wandb:
  enabled: true
  project: metaworld-window-open-DrQv2
  name: CNN_randomcrop_seed66

env:
  benchmark_id: Meta-World/MT1
  env_name: window-open
  image_height: 128
  image_width: 128
  frame_stack: 3
  action_repeat: 2
  max_episode_steps: 250

  cameras:
    - name: cam0
      r: 0.8
      theta: -30.0    
      phi: -30.0
      fovy: 45.0    
    - name: cam1
      r: 0.8
      theta: -30.0         
      phi: 0.0             
      fovy: 45.0
    - name: cam2
      r: 0.8
      theta: -30.0       
      phi: 30.0          
      fovy: 45.0
    - name: cam3
      r: 0.8
      theta: -45.0        
      phi: -30.0          
      fovy: 45.0
    - name: cam4
      r: 0.8
      theta: -45.0         
      phi: 0.0            
      fovy: 45.0
    - name: cam5
      r: 0.8
      theta: -45.0     
      phi: 30.0            
      fovy: 45.0

  lookat: [0.0, 0.6, 0.0]
  up: [0.0, 0.0, 1.0]

vision:
  encoder_type: convnet

  # ------------------------------------------------------------
  # Baseline: end-to-end ConvNet + random crop (enabled inside
  # `policies/models/vision.py` when the module is in train mode).
  # ------------------------------------------------------------
  convnet:
    crop_height: 100
    crop_width: 100

agent:
  lr: 1.0e-4
  feature_dim: 50
  hidden_dim: 1024
  critic_target_tau: 0.01

  # DrM-specific knobs
  dormant_threshold: 0.025
  target_dormant_ratio: 0.20
  dormant_temp: 10.0
  target_lambda: 0.70
  lambda_temp: 50.0
  dormant_perturb_interval: 100000
  min_perturb_factor: 0.20
  max_perturb_factor: 0.95
  perturb_rate: 2.0

  stddev_type: awake
  stddev_schedule: linear(1.0,0.1,100000)
  stddev_clip: 0.3
  expectile: 0.9

train:
  num_train_steps: 1000000
  seed_steps: 4000
  batch_size: 256
  replay_size: 100000
  update_every_steps: 2
  gradient_steps: 3
  discount: 0.99

  replay_dir: ./buffer/metaworld/window_open/cnn_w_crop/seed66/
  replay_num_workers: 4
  replay_fetch_every: 1000
  save_replay_snapshot: false
  nstep: 3

  log_every_steps: 1000
  eval_every_steps: 10000
  num_eval_episodes: 120
  rolling_window: 10

  checkpoint_every_steps: 50000
  checkpoint_dir: ./checkpoints/metaworld/policies/drqv2/cnn_w_crop/window_open/seed66/

visualization:
  enabled: false
  window_name: metaworld_window_open_drqv2
  wait_key: 1
  scale: 1.0

