# -----------------------------------------------------------------------------
# Dataset / dataloader
# -----------------------------------------------------------------------------
dataset:
  hdf5_path: ../../data/metaworld/pre-training/button-press-wall.hdf5
  batch_size: 16
  num_workers: 8
  pin_memory: true
  train_ratio: 0.96
  seed: 42
  num_episodes: null
  max_frames_per_demo: null
  camera_num: 6

# -----------------------------------------------------------------------------
# Model wrapper settings
# -----------------------------------------------------------------------------
model:
  fusion_style: "plus"         # ["cat", "plus"]
  use_dependent_vq: true
  is_dependent_ae: false
  use_invariant_vq: true
  is_invariant_ae: false
  dep_input_mask_ratio: 0.0
  dep_mask_eval: false

# -----------------------------------------------------------------------------
# Invariant / dependent codebooks
# -----------------------------------------------------------------------------
codebook:
  invariant:
    quantizer: vq
    embed_dim: 64
    n_embed: 512
    beta: 0.25

  dependent:
    quantizer: vq
    embed_dim: 64
    n_embed: 64
    beta: 0.25

# -----------------------------------------------------------------------------
# ViT encoders + token transformer + DPT decoder
# -----------------------------------------------------------------------------
vit:
  # Encoder ViT hyperparameters
  patch_size: 16
  in_chans: 3
  embed_dim: 128
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  qkv_bias: true
  dropout: 0.0
  attn_dropout: 0.0
  drop_path_rate: 0.1
  layerscale_init: 1.0e-5

  # Four tap points required by the DPT-style decoder.
  selected_layers: [1, 3, 5, 7]

  # Decoder-side token transformer before the DPT dense head.
  decoder_depth: 8
  decoder_num_heads: 8
  decoder_mlp_ratio: 4.0
  decoder_drop_path_rate: 0.1
  decoder_selected_layers: [1, 3, 5, 7]

  # DPT dense decoder width.
  dpt_features: 128

# -----------------------------------------------------------------------------
# Splatter / Gaussian parameterization
# -----------------------------------------------------------------------------
splatter:
  data:
    img_height: 128
    img_width: 128
    znear: 0.1
    zfar: 2.5
    white_background: false
    inverted_x: false
    inverted_y: false
    category: "generic"

  model:
    # Parent Gaussian layout (vanilla Splatter Image)
    max_sh_degree: 0
    isotropic: false
    depth_scale: 0.1
    depth_bias: -0.7
    xyz_scale: 0.1
    xyz_bias: 0.0
    opacity_scale: 1.0
    opacity_bias: -2.0
    scale_scale: 0.02
    scale_bias: -4.0
    num_gaussians_per_pixel: 4

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
train:
  num_epochs: 100
  max_global_steps: 300001
  lr: 3.0e-4
  lr_schedule: warmup_cosine
  lr_warmup_steps: 10000
  min_lr: 3.0e-5
  device: cuda

  # Original no-dynamics loss weights.
  rec_weight: 1.0
  ssim_weight: 0.0
  shuffle_inv_rec_weight: 1.0
  shuffle_dep_rec_weight: 1.0
  shuffle_both_rec_weight: 1.0
  vq_weight: 0.25
  inv_contrastive_weight: 1.0
  inv_consistency_weight: 0.5
  dep_contrastive_weight: 0.1
  dep_consistency_weight: 0.1
  frustum_weight: 0.01

  temperature: 0.1

  eval_every: 1000
  save_every: 10000 
  ckpt_dir: ./checkpoints/metaworld/encoders/SplatterVAE-vq/button-press-wall/with-consistency-loss/
  resume_from_last: false

# -----------------------------------------------------------------------------
# Optional logging
# -----------------------------------------------------------------------------
wandb:
  enabled: true
  project: metaworld-SplatterVAE
  entity: null
  run_name: metaworld-button-press-wall
  tags:
    - dep-masking-0.0
    - all-view-reviwo-shuffle
    - all-camera-rendering
    - embed-dim-128
    - codebook-embed-dim-64
    - depth-8
    - num-heads-8
    - DPT-fix
    - lr-3e-4
    - diverse-demo-collection
    - ssim_weight-0.0
    - max_sh_degree-0
    - VQ-codebook
    - consistency-loss