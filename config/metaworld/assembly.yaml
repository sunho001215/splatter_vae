# -----------------------------------------------------------------------------
# Dataset / dataloader
# -----------------------------------------------------------------------------
dataset:
  hdf5_path: ../../data/metaworld/near_expert/assembly.hdf5
  batch_size: 64
  num_workers: 8
  pin_memory: true
  train_ratio: 0.96
  seed: 42
  num_episodes: null
  max_frames_per_demo: null

# -----------------------------------------------------------------------------
# Model wrapper settings
# -----------------------------------------------------------------------------
model:
  fusion_style: "plus"          # ["cat", "plus"]
  use_dependent_vq: true
  is_dependent_ae: false
  use_invariant_vq: true
  is_invariant_ae: false
  dep_input_mask_ratio: 0.75
  dep_mask_eval: true

# -----------------------------------------------------------------------------
# Invariant / dependent codebooks
# -----------------------------------------------------------------------------
codebook:
  invariant:
    n_embed: 512
    embed_dim: 8
    beta: 0.25
  dependent:
    n_embed: 64
    embed_dim: 8
    beta: 0.25

# -----------------------------------------------------------------------------
# ViT encoders + token transformer + DPT decoder
# -----------------------------------------------------------------------------
vit:
  # Encoder ViT hyperparameters
  patch_size: 16
  in_chans: 3
  embed_dim: 192
  depth: 8
  num_heads: 8
  mlp_ratio: 4.0
  qkv_bias: true
  dropout: 0.0
  attn_dropout: 0.0
  drop_path_rate: 0.1
  layerscale_init: 1.0e-5

  # Four tap points required by the DPT-style decoder.
  selected_layers: [2, 5, 8, 11]

  # Decoder-side token transformer before the DPT dense head.
  decoder_depth: 12
  decoder_num_heads: 6
  decoder_mlp_ratio: 4.0
  decoder_drop_path_rate: 0.1
  decoder_selected_layers: [2, 5, 8, 11]

  # DPT dense decoder width.
  dpt_features: 128

# -----------------------------------------------------------------------------
# Splatter / Gaussian parameterization
# -----------------------------------------------------------------------------
splatter:
  data:
    img_height: 128
    img_width: 128
    znear: 0.1
    zfar: 2.5
    white_background: false
    inverted_x: false
    inverted_y: false
    category: "generic"

  model:
    # Parent Gaussian layout (vanilla Splatter Image)
    max_sh_degree: 1
    isotropic: false
    depth_scale: 0.1
    depth_bias: -0.7
    xyz_scale: 0.1
    xyz_bias: 0.0
    opacity_scale: 1.0
    opacity_bias: -2.0
    scale_scale: 0.02
    scale_bias: -4.0
    num_gaussians_per_pixel: 4

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
train:
  num_epochs: 100
  max_global_steps: 400001
  lr: 3.0e-5
  device: cuda

  # Original loss weights kept from the previous patch / current training logic.
  rec_weight: 1.0
  ssim_weight: 0.2
  vq_weight: 0.25
  inv_contrastive_weight: 1.0
  dep_contrastive_weight: 0.1
  frustum_weight: 0.01
  temperature: 0.1

  eval_every: 100
  save_every: 5000
  ckpt_dir: ./checkpoints/metaworld/encoders/SplatterVAE/assembly/
  resume_from_last: false

# -----------------------------------------------------------------------------
# Optional logging
# -----------------------------------------------------------------------------
wandb:
  enabled: true
  project: metaworld-SplatterVAE
  entity: null
  run_name: metaworld-assembly
