output:
  path: /home/ws/data/metaworld/.hdf5
  mode: overwrite 
  compression: null

metaworld:
  benchmark_id: "Meta-World/MT1"
  env_name: "coffee-push-v3"
  seed: 0
  max_steps: 250
  terminate_on_success: true

render:
  height: 224
  width: 224
  lookat: null             # if null -> try env.model.stat.center else [0,0,0]
  up: [0.0, 0.0, 1.0]
  cameras:
    - name: cam0
      r: 0.7
      theta: 30.0          # elevation from XY plane (deg)
      phi: -30.0             # azimuth around +Z (deg)
      fovy: 45.0
    - name: cam1
      r: 0.7
      theta: 30.0         
      phi: 0.0             
      fovy: 45.0
    - name: cam2
      r: 0.7
      theta: 30.0       
      phi: 30.0          
      fovy: 45.0
    - name: cam3
      r: 0.7
      theta: 45.0        
      phi: -30.0          
      fovy: 45.0
    - name: cam4
      r: 0.7
      theta: 45.0         
      phi: 0.0            
      fovy: 45.0
    - name: cam5
      r: 0.7
      theta: 45.0     
      phi: 30.0            
      fovy: 45.0

segmentation:
  enabled: true
  save_objtype: false      # if true, also store {cam}_seg_type (channel 1)

policies:
  scripted:
    enabled: true
    num_demos: 120
    policy_class: null     # optional override (e.g., "SawyerReachV3Policy")
  random:
    enabled: true
    num_demos: 30

dino:
  enabled: true
  model: "dinov2_vitb14"   # torch.hub model name
  image_size: 224
  batch_size: 16
  device: "cuda"           # cuda | cpu
  dtype: "float16"         # float16 | float32